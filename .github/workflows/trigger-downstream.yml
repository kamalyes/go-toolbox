name: Trigger Downstream

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Target downstream repository"
        required: true
        type: choice
        options:
          - go-logger
          - go-pbmo
      version:
        description: "go-toolbox version to dispatch, for example v0.15.0"
        required: true
        type: string
      create_tag:
        description: "Create a downstream tag after bumping the selected repository"
        required: false
        default: false
        type: boolean

permissions:
  actions: write
  contents: read

jobs:
  changes:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      should-dispatch: ${{ steps.filter.outputs.should-dispatch }}
    steps:
      - name: Fetch Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check changed files
        id: filter
        shell: bash
        run: |
          current_tag="${GITHUB_REF_NAME}"
          previous_tag="$(git tag --sort=-v:refname | grep -v "^${current_tag}$" | head -n 1 || true)"

          if [ -z "${previous_tag}" ]; then
            echo "should-dispatch=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "${previous_tag}..${current_tag}")"
          if [ -z "${changed_files}" ]; then
            echo "should-dispatch=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if echo "${changed_files}" | grep -Ev '(^docs/|\.md$)' >/dev/null; then
            echo "should-dispatch=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-dispatch=false" >> "$GITHUB_OUTPUT"
          fi

  dispatch:
    needs: changes
    if: always() && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.should-dispatch == 'true')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - kamalyes/go-logger
          - kamalyes/go-pbmo
    steps:
      - name: Dispatch to ${{ matrix.repo }}
        if: github.event_name == 'push' || matrix.repo == format('kamalyes/{0}', inputs.target_repo)
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_GPA_TOKEN }}
          repository: ${{ matrix.repo }}
          event-type: upstream-updated
          client-payload: >-
            {"module":"github.com/kamalyes/go-toolbox","version":"${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}","sha":"${{ github.sha }}","create_tag":${{ github.event_name == 'workflow_dispatch' && inputs.create_tag || false }},"commit_message":"📦 deps: 同步上游依赖 ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}\n\n- 📦 更新 github.com/kamalyes/go-toolbox 到 ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }} (go.mod, go.sum)\n- 🔄 自动联动下游版本标签 (bump-upstream.yml)\n\nsync upstream ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"}
